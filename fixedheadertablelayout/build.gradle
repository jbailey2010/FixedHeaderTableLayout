plugins {
    id 'com.android.library'
}

ext {
    PUBLISH_GROUP_ID = 'io.github.jbailey2010'
    PUBLISH_VERSION = '1.0.0'
    PUBLISH_ARTIFACT_ID = 'fixedheadertablelayout'
}

apply from: "${rootProject.projectDir}/scripts/publish-mavencentral.gradle"

File keystorePropertiesFile = project.rootProject.file('local.properties')
def hasReleaseKeystore = false
def releaseKeystoreProperties = null
if (keystorePropertiesFile.exists()) {
    releaseKeystoreProperties = new Properties()
    releaseKeystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    hasReleaseKeystore = releaseKeystoreProperties['keystore'] != null &&
            releaseKeystoreProperties['keystore.storePassword'] != null &&
            releaseKeystoreProperties['keystore.keyAlias'] != null &&
            releaseKeystoreProperties['keystore.keyPassword'] != null
}

android {
    namespace 'io.github.jbailey2010.fixedheadertable'
    compileSdk 37

    defaultConfig {
        minSdk 21
        targetSdk 37

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles 'proguard-rules.pro'
    }

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile file(releaseKeystoreProperties['keystore'])
                storePassword releaseKeystoreProperties['keystore.storePassword']
                keyAlias releaseKeystoreProperties['keystore.keyAlias']
                keyPassword releaseKeystoreProperties['keystore.keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }
        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    // RecyclerView is `api` so library consumers can subclass CellViewHolder
    // and reference RecycledViewPool without adding their own dependency.
    api 'androidx.recyclerview:recyclerview:1.3.2'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:rules:1.6.1'
    androidTestImplementation 'androidx.test:core:1.6.1'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
